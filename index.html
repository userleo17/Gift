<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Yosi</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #000000 0%, #001845 50%, #000000 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available; 
        }

        html {
            height: -webkit-fill-available;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            pointer-events: none;
            box-sizing: border-box;
            padding: 20px;
        }

        #startBtn {
            pointer-events: auto;
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: transparent;
            border: 2px solid #ff4d94;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff4d94, inset 0 0 15px #ff4d94;
            text-shadow: 0 0 5px #ff4d94;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }

        #startBtn:hover {
            background: #ff4d94;
            box-shadow: 0 0 30px #ff4d94, inset 0 0 30px #ff4d94;
            transform: scale(1.05);
        }

        #neonText {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff0055, 0 0 30px #ff0055;
            opacity: 0;
            position: absolute;
            top: 15%;
            text-align: center;
            transition: opacity 1.5s ease, transform 1.5s ease;
            -webkit-transition: opacity 1.5s ease, -webkit-transform 1.5s ease;
            transform: scale(0.8);
        }

        .show-neon {
            opacity: 1 !important;
            transform: scale(1) !important;
        }

        .fade-out-neon {
            opacity: 0 !important;
            transform: scale(0.9) !important;
            transition: opacity 1.5s ease, transform 1.5s ease !important;
        }

        #chatBubble {
            opacity: 0;
            pointer-events: none; 
            background-color: rgba(12, 34, 76, 0.93); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 25px 30px;
            border-radius: 20px;
            max-width: 90%;
            width: 550px;
            text-align: left;
            line-height: 1.6;
            font-size: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            position: relative;
            transition: opacity 2s ease; 
            -webkit-transition: opacity 2s ease;
            white-space: pre-wrap;
            direction: ltr;
            box-sizing: border-box;
        }

        .show-bubble {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        @media (max-width: 600px) {
            #neonText { font-size: 1.6rem; }
            #chatBubble { font-size: 14px; padding: 18px; }
            #startBtn { padding: 12px 40px; font-size: 20px; }
        }

        #chatBubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: rgba(12, 34, 76, 0.93) transparent transparent transparent;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="ui-layer">
        <button id="startBtn">Click Me</button>
        <div id="neonText">Happy Birthday Yosi 🎉</div>
        <div id="chatBubble"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const neonText = document.getElementById('neonText');
        const chatBubble = document.getElementById('chatBubble');

        let cw, ch;
        function resize() {
            cw = canvas.width = window.innerWidth;
            ch = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 200));
        resize();

        // ----------------- State & Engine -----------------
        let isAnimating = false;
        
        const heartScales = [4, 6.5, 9];
        const heartPaths = [];
        const heartProgress = [0, 0, 0];
        let currentHeartDraw = 0;
        let heartOpacity = 1;
        let drawHeartsActive = false;
        let fadeHeartsActive = false;
        let msgTriggered = false; 

        let fireworks = [];
        let balloons = [];
        let glitters = [];
        let glittersFadeInActive = false; 
        let glittersOverallAlpha = 0; 
        
        let lastX = 0;
        let lastY = 0;

        let celebrationActive = false;
        let fireworksTimerEnded = false;
        let balloonsTimerEnded = false;
        let clearScreenTriggered = false;

        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x: x * scale, y: y * scale };
        }

        for (let s of heartScales) {
            let pts = [];
            for (let t = 0; t <= Math.PI * 2 + 0.1; t += 0.05) {
                pts.push(getHeartPoint(t, s));
            }
            heartPaths.push(pts);
        }

        // ----------------- Animation Loop -----------------
        function render() {
            ctx.clearRect(0, 0, cw, ch);

            // 1. Draw Grey (Silver) Glitters
            if (glittersFadeInActive && glittersOverallAlpha < 1) {
                glittersOverallAlpha += 0.01; 
            }

            glitters.forEach(g => {
                g.alpha += g.alphaChange;
                if (g.alpha <= 0.05 || g.alpha >= g.maxAlpha) {
                    g.alphaChange *= -1;
                }
                g.alpha = Math.max(0.05, Math.min(g.alpha, g.maxAlpha));

                let drawAlpha = g.alpha * glittersOverallAlpha;

                ctx.save();
                ctx.beginPath();
                ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
                ctx.shadowBlur = 6;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
                ctx.fillStyle = `rgba(200, 205, 215, ${drawAlpha})`; 
                ctx.fill();
                ctx.restore();
            });

            // 2. Draw Hearts
            if (drawHeartsActive || heartOpacity > 0) {
                ctx.save();
                ctx.translate(cw / 2, ch / 2 + 10); 
                
                for (let i = 0; i < 3; i++) {
                    if (heartProgress[i] > 0) {
                        ctx.beginPath();
                        ctx.moveTo(heartPaths[i][0].x, heartPaths[i][0].y);
                        
                        let limit = Math.min(Math.floor(heartProgress[i]), heartPaths[i].length - 1);
                        
                        for (let j = 1; j <= limit; j++) {
                            ctx.lineTo(heartPaths[i][j].x, heartPaths[i][j].y);
                        }
                        ctx.strokeStyle = `rgba(255, 77, 148, ${heartOpacity})`;
                        ctx.lineWidth = 3.5;
                        ctx.lineCap = "round";
                        ctx.lineJoin = "round";
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = "#ff4d94";
                        ctx.stroke();
                    }
                }
                ctx.restore();

                if (drawHeartsActive) {
                    if (currentHeartDraw < 3) {
                        let speeds = [1.05, 0.7, 0.53];
                        heartProgress[currentHeartDraw] += speeds[currentHeartDraw];
                        if (heartProgress[currentHeartDraw] >= heartPaths[currentHeartDraw].length) {
                            currentHeartDraw++;
                        }
                    } else {
                        drawHeartsActive = false; 
                        triggerNextPhase();
                    }
                }

                if (fadeHeartsActive) {
                    if (heartOpacity > 0) {
                        heartOpacity -= 0.025; 
                    } else {
                        heartOpacity = 0;
                    }
                }
            }

            // 3. Draw Fireworks
            for (let i = fireworks.length - 1; i >= 0; i--) {
                let p = fireworks[i];
                
                p.vx *= 0.95; 
                p.vy *= 0.95;
                p.vy += 0.03; 
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.007; 
                
                ctx.save();
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(${p.color}, ${p.alpha})`;
                ctx.fillStyle = `rgba(${p.color}, ${p.alpha})`;
                ctx.fill();
                ctx.restore();

                if (p.alpha <= 0) fireworks.splice(i, 1);
            }

            // 4. Draw Balloons
            for (let i = balloons.length - 1; i >= 0; i--) {
                let b = balloons[i];
                b.y -= b.speed;
                
                ctx.save();
                ctx.translate(b.x, b.y);
                ctx.scale(1, 1.25);
                ctx.beginPath();
                ctx.arc(0, 0, b.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${b.alpha})`;
                ctx.fill();
                ctx.restore();
                
                ctx.beginPath();
                ctx.moveTo(b.x, b.y + b.r * 1.25);
                ctx.lineTo(b.x, b.y + b.r * 2.5);
                ctx.strokeStyle = `rgba(255, 255, 255, ${b.alpha * 0.4})`;
                ctx.lineWidth = 1;
                ctx.stroke();

                if (b.y < -100) balloons.splice(i, 1);
            }

            // التحقق من انتهاء الاحتفال واختفاء آخر بالونة تماماً
            if (balloonsTimerEnded && !clearScreenTriggered) {
                if (balloons.length === 0) {
                    celebrationActive = false; 
                    clearScreenTriggered = true;
                    
                    neonText.classList.add('fade-out-neon');
                    fadeHeartsActive = true;

                    checkHeartFadedInterval();
                }
            }

            if (isAnimating) requestAnimationFrame(render);
        }

        function checkHeartFadedInterval() {
            let check = setInterval(() => {
                if (heartOpacity <= 0) {
                    clearInterval(check);
                    if (!msgTriggered) {
                        msgTriggered = true;
                        neonText.style.display = 'none';
                        
                        createSilverGlitter(); 
                        glittersFadeInActive = true; 
                        
                        setTimeout(() => {
                            chatBubble.classList.add('show-bubble');
                            setTimeout(startTypewriter, 1000);
                        }, 300);
                    }
                }
            }, 50);
        }

        // ----------------- Helper Functions -----------------

        function generateRandomCoords() {
            let nextX, nextY;
            let attempts = 0;
            do {
                nextX = cw * (0.15 + Math.random() * 0.7);
                nextY = ch * (0.15 + Math.random() * 0.45);
                attempts++;
            } while (Math.abs(nextX - lastX) < cw * 0.15 && Math.abs(nextY - lastY) < ch * 0.15 && attempts < 10);
            
            lastX = nextX;
            lastY = nextY;
            return { x: nextX, y: nextY };
        }

        function createFirework() {
            if (fireworksTimerEnded) return; 

            const coords = generateRandomCoords();
            const colors = ['255, 77, 148', '255, 204, 0', '0, 255, 255', '255, 255, 255'];
            for (let i = 0; i < 75; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 6 + 1.5;
                fireworks.push({
                    x: coords.x,
                    y: coords.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    r: Math.random() * 2 + 1,
                    alpha: 1,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        function startSequentialFireworks() {
            if (fireworksTimerEnded) return;
            createFirework();
            setTimeout(startSequentialFireworks, 1000);
        }

        let balloonInterval;
        let isGeneratingBalloons = false;

        function startBalloons() {
            isGeneratingBalloons = true;
            balloonInterval = setInterval(() => {
                if (isGeneratingBalloons && !balloonsTimerEnded) {
                    balloons.push({
                        x: Math.random() * cw,
                        y: ch + 50,
                        r: Math.random() * 10 + 10,
                        speed: Math.random() * 1.3 + 1.0, 
                        alpha: Math.random() * 0.06 + 0.02
                    });
                }
            }, 350); 
        }

        function createSilverGlitter() {
            for (let i = 0; i < 120; i++) { 
                let maxAlpha = Math.random() * 0.6 + 0.2;
                glitters.push({
                    x: Math.random() * cw,
                    y: Math.random() * ch,
                    r: Math.random() * 1.5 + 0.6,
                    alpha: Math.random() * maxAlpha, 
                    maxAlpha: maxAlpha,
                    alphaChange: (Math.random() * 0.005 + 0.003) * (Math.random() > 0.5 ? 1 : -1)
                });
            }
        }

        // ----------------- Main Timeline -----------------
        
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            isAnimating = true;
            drawHeartsActive = true;
            render();
        });

        function triggerNextPhase() {
            celebrationActive = true;
            startSequentialFireworks(); 
            startBalloons(); 

            // تنتهي الالعاب النارية أولاً بعد 8 ثوانٍ
            setTimeout(() => {
                fireworksTimerEnded = true; 
                fireworks = []; // إزالة أي جزيئات متبقية فوراً
            }, 8000); 

            // تنتهي البالونات بعد الألعاب النارية بثانيتين (عند الثانية 10)
            setTimeout(() => {
                clearInterval(balloonInterval); 
                isGeneratingBalloons = false; 
                balloonsTimerEnded = true; 
            }, 10000); 
        }

        // ----------------- Typewriter Effect -----------------
        const finalMessage = "Happy Birthday, my handsome love 🎂!!\n\nHappy Birthday to the most precious person in my life. I’m so lucky to have you, and I’m grateful for every moment we share together. You make my life brighter and my heart happier every single day.\n\nI hope this year brings you happiness, good health, success, and that all your dreams come true. You truly deserve the very best !!\n\nThank you for always making me smile. I’m so proud of you, and I’ll always be by your side 😚.\n\nI love you so much yosi 🩷!";
        
        function startTypewriter() {
            let i = 0;
            chatBubble.innerHTML = '';
            
            function type() {
                if (i < finalMessage.length) {
                    chatBubble.innerHTML += finalMessage.charAt(i);
                    i++;
                    let speed = Math.random() * 40 + 40; 
                    setTimeout(type, speed);
                }
            }
            type();
        }

    </script>
</body>
</html>
