<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Yosi</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* التدرج اللوني: أسود فوق، كحلي بالمنتصف، أسود تحت */
            background: linear-gradient(to bottom, #000000 0%, #001845 50%, #000000 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available; 
        }

        html {
            height: -webkit-fill-available;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            pointer-events: none;
            box-sizing: border-box;
            padding: 20px;
        }

        #startBtn {
            pointer-events: auto;
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: transparent;
            border: 2px solid #ff4d94;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff4d94, inset 0 0 15px #ff4d94;
            text-shadow: 0 0 5px #ff4d94;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }

        #startBtn:hover {
            background: #ff4d94;
            box-shadow: 0 0 30px #ff4d94, inset 0 0 30px #ff4d94;
            transform: scale(1.05);
        }

        #neonText {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff0055, 0 0 30px #ff0055;
            opacity: 0;
            position: absolute;
            top: 15%;
            text-align: center;
            transition: opacity 2s ease, transform 2s ease;
            -webkit-transition: opacity 2s ease, -webkit-transform 2s ease;
            transform: scale(0.8);
        }

        .show-neon {
            opacity: 1 !important;
            transform: scale(1) !important;
        }

        .fade-out-neon {
            opacity: 0 !important;
            transform: scale(0.9) !important;
        }

        /* تعديل متوافق تماماً مع سفاري للظهور السلس للرسالة دون مشاكل */
        #chatBubble {
            opacity: 0;
            pointer-events: none; /* يمنع التفاعل وهي مخفية */
            background: linear-gradient(
                120deg, 
                rgba(30, 30, 30, 0.85) 30%, 
                rgba(180, 180, 180, 0.25) 40%, 
                rgba(180, 180, 180, 0.25) 60%, 
                rgba(30, 30, 30, 0.85) 70%
            );
            background-size: 200% 100%;
            animation: silverSheen 4s linear infinite;
            -webkit-animation: silverSheen 4s linear infinite;
            -webkit-backdrop-filter: blur(12px); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px 30px;
            border-radius: 20px;
            max-width: 90%;
            width: 550px;
            text-align: left;
            line-height: 1.6;
            font-size: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 255, 255, 0.05);
            position: relative;
            transition: opacity 2.5s ease; /* ظهور تدريجي ناعم جداً */
            -webkit-transition: opacity 2.5s ease;
            white-space: pre-wrap;
            direction: ltr;
            box-sizing: border-box;
        }

        /* الكلاس المسؤول عن تفعيل ظهور الرسالة */
        .show-bubble {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        @keyframes silverSheen {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @-webkit-keyframes silverSheen {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 600px) {
            #neonText { font-size: 1.8rem; }
            #chatBubble { font-size: 15px; padding: 20px; }
            #startBtn { padding: 12px 40px; font-size: 20px; }
        }

        #chatBubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: rgba(30, 30, 30, 0.85) transparent transparent transparent;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="ui-layer">
        <button id="startBtn">Click Me</button>
        <div id="neonText">Happy Birthday To Yosi 🎉</div>
        <div id="chatBubble"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const neonText = document.getElementById('neonText');
        const chatBubble = document.getElementById('chatBubble');

        let cw, ch;
        function resize() {
            cw = canvas.width = window.innerWidth;
            ch = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 200));
        resize();

        // ----------------- State & Engine -----------------
        let isAnimating = false;
        
        const heartScales = [4, 6.5, 9];
        const heartPaths = [];
        const heartProgress = [0, 0, 0];
        let currentHeartDraw = 0;
        let heartOpacity = 1;
        let drawHeartsActive = false;
        let fadeHeartsActive = false;
        let msgTriggered = false; 

        let fireworks = [];
        let balloons = [];
        let glitters = [];

        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x: x * scale, y: y * scale };
        }

        for (let s of heartScales) {
            let pts = [];
            for (let t = 0; t <= Math.PI * 2 + 0.1; t += 0.05) {
                pts.push(getHeartPoint(t, s));
            }
            heartPaths.push(pts);
        }

        // ----------------- Animation Loop -----------------
        function render() {
            ctx.clearRect(0, 0, cw, ch);

            // 1. Draw Glitters
            glitters.forEach(g => {
                g.alpha += g.alphaChange;
                if (g.alpha <= 0.1 || g.alpha >= 0.8) g.alphaChange *= -1;
                ctx.beginPath();
                ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 0, ${g.alpha})`; 
                ctx.fill();
            });

            // 2. Draw Hearts
            if (drawHeartsActive || heartOpacity > 0) {
                ctx.save();
                ctx.translate(cw / 2, ch / 2 + 10); 
                
                for (let i = 0; i < 3; i++) {
                    if (heartProgress[i] > 0) {
                        ctx.beginPath();
                        ctx.moveTo(heartPaths[i][0].x, heartPaths[i][0].y);
                        
                        let limit = Math.min(Math.floor(heartProgress[i]), heartPaths[i].length - 1);
                        
                        for (let j = 1; j <= limit; j++) {
                            ctx.lineTo(heartPaths[i][j].x, heartPaths[i][j].y);
                        }
                        ctx.strokeStyle = `rgba(255, 77, 148, ${heartOpacity})`;
                        ctx.lineWidth = 3.5;
                        ctx.lineCap = "round";
                        ctx.lineJoin = "round";
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = "#ff4d94";
                        ctx.stroke();
                    }
                }
                ctx.restore();

                if (drawHeartsActive) {
                    if (currentHeartDraw < 3) {
                        let speeds = [1.05, 0.7, 0.53];
                        heartProgress[currentHeartDraw] += speeds[currentHeartDraw];
                        if (heartProgress[currentHeartDraw] >= heartPaths[currentHeartDraw].length) {
                            currentHeartDraw++;
                        }
                    } else {
                        drawHeartsActive = false; 
                        triggerNextPhase();
                    }
                }

                if (fadeHeartsActive) {
                    if (heartOpacity > 0) {
                        heartOpacity -= 0.006; // تلاشي ناعم وبطيء جداً للقلوب
                    } else {
                        heartOpacity = 0;
                        if (!msgTriggered) {
                            msgTriggered = true;
                            setTimeout(() => {
                                neonText.style.display = 'none'; 
                                createGlitter();
                                chatBubble.classList.add('show-bubble'); // تفعيل الظهور الآمن والناعم للرسالة
                                setTimeout(startTypewriter, 1000); // الانتظار ثانية حتى اكتمال ظهور الفقاعة ثم بدء الكتابة
                            }, 500);
                        }
                    }
                }
            }

            // 3. Draw Fireworks (تأثير متوهج، سلس وبطيء)
            for (let i = fireworks.length - 1; i >= 0; i--) {
                let p = fireworks[i];
                
                // إضافة احتكاك هواء لجعل جزيئات الطراطيع تتباطأ بسلاسة
                p.vx *= 0.95; 
                p.vy *= 0.95;
                p.vy += 0.03; // جاذبية خفيفة جداً لتأثير طفو ناعم
                
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.007; // معدل تلاشي أبطأ لتصبح شفافة ببطء
                
                ctx.save();
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                
                // تأثير التوهج اللامع للشرارات
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(${p.color}, ${p.alpha})`;
                ctx.fillStyle = `rgba(${p.color}, ${p.alpha})`;
                ctx.fill();
                ctx.restore();

                if (p.alpha <= 0) fireworks.splice(i, 1);
            }

            // 4. Draw Balloons
            for (let i = balloons.length - 1; i >= 0; i--) {
                let b = balloons[i];
                b.y -= b.speed;
                
                ctx.save();
                ctx.translate(b.x, b.y);
                ctx.scale(1, 1.25);
                ctx.beginPath();
                ctx.arc(0, 0, b.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${b.alpha})`;
                ctx.fill();
                ctx.restore();
                
                ctx.beginPath();
                ctx.moveTo(b.x, b.y + b.r * 1.25);
                ctx.lineTo(b.x, b.y + b.r * 2.5);
                ctx.strokeStyle = `rgba(255, 255, 255, ${b.alpha * 0.4})`;
                ctx.lineWidth = 1;
                ctx.stroke();

                if (b.y < -100) balloons.splice(i, 1);
            }

            if (isAnimating) requestAnimationFrame(render);
        }

        // ----------------- Helper Functions -----------------

        function createFirework(x, y) {
            const colors = ['255, 77, 148', '255, 204, 0', '0, 255, 255', '255, 255, 255'];
            for (let i = 0; i < 75; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 6 + 1.5;
                fireworks.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    r: Math.random() * 2 + 1,
                    alpha: 1,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        let balloonInterval;
        let isGeneratingBalloons = false;

        function startBalloons() {
            isGeneratingBalloons = true;
            balloonInterval = setInterval(() => {
                if (isGeneratingBalloons) {
                    balloons.push({
                        x: Math.random() * cw,
                        y: ch + 50,
                        r: Math.random() * 12 + 12,
                        speed: Math.random() * 1.2 + 0.8, // بالونات أبطأ وأكثر سلاسة
                        alpha: Math.random() * 0.08 + 0.03
                    });
                }
            }, 120);
        }

        function createGlitter() {
            for (let i = 0; i < 100; i++) {
                glitters.push({
                    x: Math.random() * cw,
                    y: Math.random() * ch,
                    r: Math.random() * 1.5 + 0.5,
                    alpha: Math.random(),
                    alphaChange: 0.008 * (Math.random() > 0.5 ? 1 : -1)
                });
            }
        }

        // ----------------- Main Timeline -----------------
        
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            isAnimating = true;
            drawHeartsActive = true;
            render();
        });

        function triggerNextPhase() {
            // 1. ظهور النص النيوني بنعومة وسلاسة
            neonText.classList.add('show-neon');
            
            // 2. تفعيل توليد الطراطيع والبالونات معاً بالتوازي
            let fwInterval = setInterval(() => {
                createFirework(cw * (0.2 + Math.random() * 0.6), ch * (0.2 + Math.random() * 0.4));
            }, 600); 

            startBalloons();

            // 3. التوقف التدريجي والناعم بعد 6 ثوانٍ من الاحتفال
            setTimeout(() => {
                clearInterval(fwInterval); // توقف توليد طراطيع جديدة، الحالية ستتلاشى طبيعياً
                clearInterval(balloonInterval); // توقف توليد بالونات جديدة
                isGeneratingBalloons = false; // السماح للبالونات الموجودة بالصعود والخروج من الشاشة تماماً
                
                // 4. ننتظر حتى تخرج البالونات وتتلاشى الطراطيع تماماً، ثم نختفي بنعومة مطلقة
                setTimeout(() => {
                    neonText.classList.add('fade-out-neon'); // تلاشي سلس للكلام عبر الـ CSS
                    fadeHeartsActive = true; // تلاشي سلس للقلوب عبر الـ Canvas
                }, 5500); // 5.5 ثانية تضمن صعود البالونات بالكامل للأعلى وتلاشي الطراطيع

            }, 6000); 
        }

        // ----------------- Typewriter Effect -----------------
        const finalMessage = "Happy birthday to the person who makes every day brighter 🎉 ...\n\nThank you for being my safe place, my supporter, and the kindest person ever ..\n\nI hope this year brings you as much happiness as you bring into my \nlife ... I love you much yosi 🩷!";
        
        function startTypewriter() {
            let i = 0;
            chatBubble.innerHTML = '';
            
            function type() {
                if (i < finalMessage.length) {
                    chatBubble.innerHTML += finalMessage.charAt(i);
                    i++;
                    let speed = Math.random() * 60 + 60; 
                    setTimeout(type, speed);
                }
            }
            type();
        }

    </script>
</body>
</html>
