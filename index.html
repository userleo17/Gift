<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Yosi</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #000000 0%, #001845 50%, #000000 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available; 
        }

        html {
            height: -webkit-fill-available;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            pointer-events: none;
            box-sizing: border-box;
            padding: 20px;
        }

        #startBtn {
            pointer-events: auto;
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: transparent;
            border: 2px solid #ff4d94;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff4d94, inset 0 0 15px #ff4d94;
            text-shadow: 0 0 5px #ff4d94;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }

        #startBtn:hover {
            background: #ff4d94;
            box-shadow: 0 0 30px #ff4d94, inset 0 0 30px #ff4d94;
            transform: scale(1.05);
        }

        #neonText {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff0055, 0 0 30px #ff0055;
            opacity: 0;
            position: absolute;
            top: 15%;
            text-align: center;
            transition: opacity 2s ease, transform 2s ease;
            -webkit-transition: opacity 2s ease, -webkit-transform 2s ease;
            transform: scale(0.8);
        }

        .show-neon {
            opacity: 1 !important;
            transform: scale(1) !important;
        }

        .fade-out-neon {
            opacity: 0 !important;
            transform: scale(0.9) !important;
            transition: opacity 2.5s ease, transform 2.5s ease !important;
        }

        #chatBubble {
            opacity: 0;
            pointer-events: none; 
            background: linear-gradient(
                120deg, 
                rgba(30, 30, 30, 0.85) 30%, 
                rgba(180, 180, 180, 0.25) 40%, 
                rgba(180, 180, 180, 0.25) 60%, 
                rgba(30, 30, 30, 0.85) 70%
            );
            background-size: 200% 100%;
            animation: silverSheen 4s linear infinite;
            -webkit-animation: silverSheen 4s linear infinite;
            -webkit-backdrop-filter: blur(12px); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px 30px;
            border-radius: 20px;
            max-width: 90%;
            width: 550px;
            text-align: left;
            line-height: 1.6;
            font-size: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 255, 255, 0.05);
            position: relative;
            transition: opacity 2s ease; 
            -webkit-transition: opacity 2s ease;
            white-space: pre-wrap;
            direction: ltr;
            box-sizing: border-box;
        }

        .show-bubble {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        @keyframes silverSheen {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @-webkit-keyframes silverSheen {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 600px) {
            #neonText { font-size: 1.6rem; }
            #chatBubble { font-size: 14px; padding: 18px; }
            #startBtn { padding: 12px 40px; font-size: 20px; }
        }

        #chatBubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: rgba(30, 30, 30, 0.85) transparent transparent transparent;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="ui-layer">
        <button id="startBtn">Click Me</button>
        <div id="neonText">Happy Birthday To Yosi 🎉</div>
        <div id="chatBubble"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const neonText = document.getElementById('neonText');
        const chatBubble = document.getElementById('chatBubble');

        let cw, ch;
        function resize() {
            cw = canvas.width = window.innerWidth;
            ch = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 200));
        resize();

        // ----------------- State & Engine -----------------
        let isAnimating = false;
        
        const heartScales = [4, 6.5, 9];
        const heartPaths = [];
        const heartProgress = [0, 0, 0];
        let currentHeartDraw = 0;
        let heartOpacity = 1;
        let drawHeartsActive = false;
        let fadeHeartsActive = false;
        let msgTriggered = false; 

        let fireworks = [];
        let balloons = [];
        let glitters = [];
        
        let lastX = 0;
        let lastY = 0;

        let celebrationActive = false;
        let celebrationTimerEnded = false;
        let clearScreenTriggered = false;

        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x: x * scale, y: y * scale };
        }

        for (let s of heartScales) {
            let pts = [];
            for (let t = 0; t <= Math.PI * 2 + 0.1; t += 0.05) {
                pts.push(getHeartPoint(t, s));
            }
            heartPaths.push(pts);
        }

        // ----------------- Animation Loop -----------------
        function render() {
            ctx.clearRect(0, 0, cw, ch);

            // 1. Draw Grey (Silver) Glitters
            glitters.forEach(g => {
                g.alpha += g.alphaChange;
                if (g.alpha <= 0.1 || g.alpha >= 0.8) g.alphaChange *= -1;
                
                ctx.save();
                ctx.beginPath();
                ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
                ctx.shadowBlur = 6;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
                ctx.fillStyle = `rgba(200, 205, 215, ${g.alpha})`; 
                ctx.fill();
                ctx.restore();
            });

            // 2. Draw Hearts
            if (drawHeartsActive || heartOpacity > 0) {
                ctx.save();
                ctx.translate(cw / 2, ch / 2 + 10); 
                
                for (let i = 0; i < 3; i++) {
                    if (heartProgress[i] > 0) {
                        ctx.beginPath();
                        ctx.moveTo(heartPaths[i][0].x, heartPaths[i][0].y);
                        
                        let limit = Math.min(Math.floor(heartProgress[i]), heartPaths[i].length - 1);
                        
                        for (let j = 1; j <= limit; j++) {
                            ctx.lineTo(heartPaths[i][j].x, heartPaths[i][j].y);
                        }
                        ctx.strokeStyle = `rgba(255, 77, 148, ${heartOpacity})`;
                        ctx.lineWidth = 3.5;
                        ctx.lineCap = "round";
                        ctx.lineJoin = "round";
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = "#ff4d94";
                        ctx.stroke();
                    }
                }
                ctx.restore();

                if (drawHeartsActive) {
                    if (currentHeartDraw < 3) {
                        let speeds = [1.05, 0.7, 0.53];
                        heartProgress[currentHeartDraw] += speeds[currentHeartDraw];
                        if (heartProgress[currentHeartDraw] >= heartPaths[currentHeartDraw].length) {
                            currentHeartDraw++;
                        }
                    } else {
                        drawHeartsActive = false; 
                        triggerNextPhase();
                    }
                }

                if (fadeHeartsActive) {
                    if (heartOpacity > 0) {
                        heartOpacity -= 0.015; 
                    } else {
                        heartOpacity = 0;
                    }
                }
            }

            // 3. Draw Fireworks
            for (let i = fireworks.length - 1; i >= 0; i--) {
                let p = fireworks[i];
                
                p.vx *= 0.95; 
                p.vy *= 0.95;
                p.vy += 0.03; 
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.007; 
                
                ctx.save();
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(${p.color}, ${p.alpha})`;
                ctx.fillStyle = `rgba(${p.color}, ${p.alpha})`;
                ctx.fill();
                ctx.restore();

                if (p.alpha <= 0) fireworks.splice(i, 1);
            }

            // 4. Draw Balloons
            for (let i = balloons.length - 1; i >= 0; i--) {
                let b = balloons[i];
                b.y -= b.speed;
                
                ctx.save();
                ctx.translate(b.x, b.y);
                ctx.scale(1, 1.25);
                ctx.beginPath();
                ctx.arc(0, 0, b.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${b.alpha})`;
                ctx.fill();
                ctx.restore();
                
                ctx.beginPath();
                ctx.moveTo(b.x, b.y + b.r * 1.25);
                ctx.lineTo(b.x, b.y + b.r * 2.5);
                ctx.strokeStyle = `rgba(255, 255, 255, ${b.alpha * 0.4})`;
                ctx.lineWidth = 1;
                ctx.stroke();

                if (b.y < -100) balloons.splice(i, 1);
            }

            if (celebrationTimerEnded && !clearScreenTriggered) {
                if (balloons.length === 0 && fireworks.length === 0) {
                    clearScreenTriggered = true;
                    
                    neonText.classList.add('fade-out-neon');
                    fadeHeartsActive = true;

                    checkHeartFadedInterval();
                }
            }

            if (isAnimating) requestAnimationFrame(render);
        }

        function checkHeartFadedInterval() {
            let check = setInterval(() => {
                if (heartOpacity <= 0) {
                    clearInterval(check);
                    if (!msgTriggered) {
                        msgTriggered = true;
                        neonText.style.display = 'none';
                        createSilverGlitter(); 
                        
                        setTimeout(() => {
                            chatBubble.classList.add('show-bubble');
                            setTimeout(startTypewriter, 1000);
                        }, 500);
                    }
                }
            }, 100);
        }

        // ----------------- Helper Functions -----------------

        function generateRandomCoords() {
            let nextX, nextY;
            let attempts = 0;
            do {
                nextX = cw * (0.15 + Math.random() * 0.7);
                nextY = ch * (0.15 + Math.random() * 0.45);
                attempts++;
            } while (Math.abs(nextX - lastX) < cw * 0.15 && Math.abs(nextY - lastY) < ch * 0.15 && attempts < 10);
            
            lastX = nextX;
            lastY = nextY;
            return { x: nextX, y: nextY };
        }

        function createFirework() {
            const coords = generateRandomCoords();
            const colors = ['255, 77, 148', '255, 204, 0', '0, 255, 255', '255, 255, 255'];
            for (let i = 0; i < 75; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 6 + 1.5;
                fireworks.push({
                    x: coords.x,
                    y: coords.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    r: Math.random() * 2 + 1,
                    alpha: 1,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        function startSequentialFireworks() {
            if (!celebrationActive) return;
            createFirework();
            setTimeout(startSequentialFireworks, 1000);
        }

        let balloonInterval;
        let isGeneratingBalloons = false;

        function startBalloons() {
            isGeneratingBalloons = true;
            balloonInterval = setInterval(() => {
                if (isGeneratingBalloons) {
                    balloons.push({
                        x: Math.random() * cw,
                        y: ch + 50,
                        r: Math.random() * 12 + 12,
                        speed: Math.random() * 1.2 + 0.8, 
                        alpha: Math.random() * 0.08 + 0.03
                    });
                }
            }, 120);
        }

        function createSilverGlitter() {
            for (let i = 0; i < 100; i++) {
                glitters.push({
                    x: Math.random() * cw,
                    y: Math.random() * ch,
                    r: Math.random() * 1.5 + 0.6,
                    alpha: Math.random() * 0.7 + 0.1,
                    alphaChange: 0.007 * (Math.random() > 0.5 ? 1 : -1)
                });
            }
        }

        // ----------------- Main Timeline -----------------
        
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            isAnimating = true;
            drawHeartsActive = true;
            render();
        });

        function triggerNextPhase() {
            neonText.classList.add('show-neon');
            
            celebrationActive = true;
            startSequentialFireworks(); 
            startBalloons(); 

            setTimeout(() => {
                celebrationActive = false; 
                clearInterval(balloonInterval); 
                isGeneratingBalloons = false; 
                celebrationTimerEnded = true; 
            }, 7000); 
        }

        // ----------------- Typewriter Effect -----------------
        const finalMessage = "Happy Birthday, my handsome love 🎂!!\n\nToday is not just any day, it’s the day the most special person in my life was born. I’m so lucky to have you by my side. You are my happiness, my comfort, and the reason behind so many of my smiles.\n\nI hope your birthday is as beautiful as your heart, and I hope this new year of your life brings you endless happiness, success, and everything you dream of .. Thank you for loving me, caring for me, and making my days brighter 😚!\n\nYou mean so much to me, and I’m grateful for every moment we share together. I hope you always know how special you are to me.\n\nI love you so much Yosi 🩷!!";
        
        function startTypewriter() {
            let i = 0;
            chatBubble.innerHTML = '';
            
            function type() {
                if (i < finalMessage.length) {
                    chatBubble.innerHTML += finalMessage.charAt(i);
                    i++;
                    let speed = Math.random() * 40 + 40; 
                    setTimeout(type, speed);
                }
            }
            type();
        }

    </script>
</body>
</html>
